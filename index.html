<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>삼척시 홍보 웹페이지</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Noto Sans KR", Arial, sans-serif;
      background: #f4f7fb;
      color: #222;
    }

    header {
      height: 100vh;
      background:
        linear-gradient(rgba(0, 0, 0, 0.35), rgba(0, 0, 0, 0.35)),
        url("https://www.gangwon.to/upload/board/BDMAIN03/eedc6a60-fb8d-41a9-987e-17ab6cc22af5.jpg");
      background-size: cover;
      background-position: center;
      color: white;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 60px;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(6px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-size: 26px;
      font-weight: 800;
      cursor: pointer;
    }

    .menu {
      display: flex;
      gap: 24px;
      list-style: none;
    }

    .menu button {
      border: none;
      background: none;
      color: white;
      font-size: 16px;
      cursor: pointer;
      padding: 8px 4px;
    }

    .menu button:hover {
      color: #ffd166;
    }

    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 30px;
    }

    .hero h1 {
      font-size: 45px;
      margin-bottom: 18px;
    }

    .hero p {
      font-size: 22px;
      line-height: 1.6;
    }

    main {
      max-width: 1200px;
      margin: 30px auto 80px;
      padding: 0 24px;
      position: relative;
      z-index: 2;
    }

    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 28px;
    }

    aside {
      background: white;
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      height: fit-content;
    }

    aside h2 {
      font-size: 22px;
text-align: center;
      margin-bottom: 18px;
      color: #0064cd;
    }

    .side-menu {
      list-style: none;
    }

    .side-menu li {
      margin-bottom: 10px;
    }

    .side-menu button {
      width: 100%;
      border: none;
      background: #e3f1ff;
      color: #222;
      padding: 12px 14px;
      border-radius: 12px;
      cursor: pointer;
      text-align: left;
      font-size: 15px;
      transition: 0.2s;
    }

    .side-menu button:hover,
    .side-menu button.active {
      background: #0064cd;
      color: white;
      transform: translateX(4px);
    }

    .content {
      background: white;
      border-radius: 22px;
      padding: 36px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      min-height: 520px;
    }

    .content h2 {
      font-size: 34px;
      margin-bottom: 18px;
      color: #0064cd;
    }

    .content p {
      font-size: 17px;
      line-height: 1.8;
      margin-bottom: 16px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-top: 24px;
    }

    .card {
      background: #e3f1ff;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid #dde7ec;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.12);
    }

    .card img {
      width: 100%;
      height: 170px;
      object-fit: cover;
    }

    .card div {
      padding: 18px;
    }

    .card h3 {
      margin-bottom: 8px;
      color: #013f80;
    }

    .tag {
      display: inline-block;
      background: #ffd166;
      color: #222;
      padding: 6px 12px;
      border-radius: 999px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .timeline {
      margin-top: 20px;
      border-left: 4px solid #013f80;
      padding-left: 20px;
    }

    .timeline article {
      margin-bottom: 20px;
      background: #e3f1ff;
      padding: 18px;
      border-radius: 14px;
    }

    footer {
      background: #013f80;
      color: white;
      text-align: center;
      padding: 30px;
    }

    @media (max-width: 850px) {
      nav {
        padding: 18px 24px;
        flex-direction: column;
        gap: 12px;
      }

      .menu {
        flex-wrap: wrap;
        justify-content: center;
      }

      .hero h1 {
        font-size: 40px;
      }

      main {
        margin-top: -40px;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .cards {
        grid-template-columns: 1fr;
      }
    }
ul {
  margin: 10;
  padding: 10;

}

ul li {
  margin-top: 10px;  /* 위쪽 여백 */
  margin-bottom: 10px; /* 아래쪽 여백 */
 margin-left: 30px; /* 아래쪽 여백 */

    const content = document.getElementById("content");
    const buttons = document.querySelectorAll(".side-menu button");

    function showPage(pageName) {
      const page = pages[pageName] || pages.home;
      content.innerHTML = page.html;

      buttons.forEach(button => {
        button.classList.remove("active");

        const buttonText = button.textContent;
        const pageTitle = page.title;

        if (
          buttonText.includes(pageTitle) ||
          pageTitle.includes(buttonText.replace("HOME", "").trim()) ||
          (pageName === "home" && buttonText === "홈")
        ) {
          button.classList.add("active");
        }
      });

      window.scrollTo({
        top: document.querySelector("main").offsetTop - 30,
        behavior: "smooth"
      });
    }

    showPage("home");
  </script>
